notice_no: "종합부동산세법 제8조~제9조"
source_url: "https://www.law.go.kr/법령/종합부동산세법"
data:
  # 공정시장가액비율 (종부세법 시행령)
  fair_market_ratio: "0.60"
  # 기본 공제 (종부세법 제8조)
