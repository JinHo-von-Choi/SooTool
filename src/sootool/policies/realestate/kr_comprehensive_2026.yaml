    one_house: 1200000000        # 1세대 1주택: 12억
    multi_house: 900000000        # 다주택: 9억
  # 1세대1주택 누진세율 (종부세법 제9조 제1항)
  one_house_brackets:
    - upper: 300000000
      rate: 0.005
    - upper: 600000000
      rate: 0.007
    - upper: 1200000000
      rate: 0.010
    - upper: 2500000000
      rate: 0.013
    - upper: 5000000000
      rate: 0.015
    - upper: 9400000000
      rate: 0.020
    - upper: null
      rate: 0.027
  # 다주택(3주택 이상) 누진세율
  multi_house_brackets:
    - upper: 300000000
      rate: 0.005
    - upper: 600000000
      rate: 0.007
    - upper: 1200000000
      rate: 0.010
    - upper: 2500000000
      rate: 0.020
    - upper: 5000000000
      rate: 0.030
    - upper: 9400000000
      rate: 0.040
    - upper: null
      rate: 0.050
  # 농어촌특별세: 종부세의 20%
  rural_special_rate: "0.20"
