sha256: "b0891db7db0c447fa37dc4dbd19e3c9e04676272c596c185c3d6cacf364d8d19"
meta:
  domain: tax
  name:   kr_simplified_vat
  year:   2026
effective_date: "2026-01-01"
notice_no: "부가가치세법 제61조·제63조 / 부가가치세법 시행령 제111조 (간이과세자 업종별 부가가치율)"
source_url: "https://www.law.go.kr/"
# 2026-04-24 조사:
#   - 간이과세자 대상: 직전연도 공급대가 1억 4백만원 미만 (2024.7.1. 시행 기준, 2026도 동일)
#   - 공급대가 = 공급가액 + 부가가치세
#   - 납부세액 = 공급대가 × 업종별 부가가치율 × 10% (부가세법 §63)
#   - 납부면제 기준: 공급대가 연 4,800만원 미만 (부가세법 §69)
#   - 공제세액: 세금계산서 수취액 × 부가가치율 × 10% (매입세액공제)
data:
  # 간이과세 한도 (공급대가 기준)
  threshold_amount: 104000000       # 1억 4백만원 미만이어야 간이과세 대상
  nonpayment_threshold: 48000000    # 4,800만원 미만이면 납부 면제
  vat_rate: "0.10"                  # 일반 부가세율 10%

  # 업종별 부가가치율 (부가가치세법 시행령 제111조 별표)
  # 2021.7.1. 개정 이후 적용되는 표준값
  value_added_rates:
    retail:              "0.15"   # 소매업, 음식점업(이하 6%)이 아닌 일반 판매
    manufacturing:       "0.20"   # 제조업, 농·임·어업, 소화물 전문 운송업
    accommodation:       "0.25"   # 숙박업
    construction:        "0.30"   # 건설업, 운수·창고업, 정보통신업(방송·통신 제외)
    financial:           "0.40"   # 금융·보험 관련 서비스업, 전문·과학·기술 서비스업
    other_services:      "0.30"   # 기타 서비스업
    # 하위 호환 별칭 (사용자 지정 고려)
    sales:               "0.15"   # 판매업 (=retail)
    food_service:        "0.15"   # 음식점업 (부가세법 시행령 §111 별표, 2021.7.1 이후)
