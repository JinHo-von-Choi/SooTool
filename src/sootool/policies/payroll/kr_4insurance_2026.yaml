sha256: "54774f01616cd1c25eb86edc48f7375d21a134bd5bbef97266c5b9d12abfac5c"
effective_date: "2026-01-01"
notice_no: "국민건강보험법 시행령 일부개정령 (대통령령 제35931호, 2025.12.23. 공포, 2026.1.1. 시행)"
source_url: "https://www.mohw.go.kr/board.es?act=view&bid=0027&list_no=1487279&mid=a10503000000"
# 2026-04-23 verified: 건강보험료율 7.19% (근로자·사용자 각 3.595%)는
# 국민건강보험법 시행령 일부개정령(대통령령 제35931호, 2025.12.23.)으로 반영.
# 국민연금 9.5% 인상안은 국회 통과 미확정 — 보수적으로 2025 기준 4.5% 유지.
# 고용보험·산재보험 요율은 고용노동부 관할로 별도 고시 (2025 기준 유지).
data:
  # 2026년 4대보험 요율 (근로자 부담 기준)
  # 참고: 건강보험만 2026 공식 고시 반영. 그 외는 2025 기준 유지.
  national_pension:
    # 국민연금: 근로자 4.5%, 사용자 4.5% (총 9%)
    # 기준소득월액 상·하한: 2025-07 기준 하한 370,000, 상한 5,900,000
    employee_rate: "0.045"
    employer_rate: "0.045"
    base_min_monthly: 370000
    base_max_monthly: 5900000
  health_insurance:
    # 건강보험: 근로자 3.595%, 사용자 3.595% (총 7.19%)
    # 2025 대비 인상: 총 7.09% → 7.19% (근로자 3.545% → 3.595%)
    employee_rate: "0.03595"
    employer_rate: "0.03595"
    # 장기요양보험: 건강보험료의 12.95% (2026 고시 전 — 2025 값 유지)
    long_term_care_rate_of_health: "0.1295"
  employment_insurance:
    # 고용보험 (근로자 부담: 실업급여 0.9%)
    employee_rate: "0.009"
    # 사용자 부담은 사업장 규모별 상이: 단순 계산에서는 제외
  industrial_accident:
    # 산재보험: 전액 사용자 부담, 업종별 상이
    # 근로자 부담 없음 → 표준 계산에서는 0
    employee_rate: "0.0"
  income_tax:
    # 간이세액표 근사: 월급여 x 간이세율로 근사 (실무에서는 월급여표 대조)
    # 본 도구에서는 kr_income 누진세율 기반 연환산 후 /12 로 처리 (trace에 명시)
    reference_policy: "tax/kr_income_2026"
  local_income_tax:
    # 지방소득세: 소득세의 10%
    rate_of_income_tax: "0.1"
  non_taxable:
    # 비과세: 월 식대 한도 (소득세법 시행령 제17조)
    meal_monthly_cap: 200000
