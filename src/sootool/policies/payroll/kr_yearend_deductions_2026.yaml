meta:
  domain: payroll
  name:   kr_yearend_deductions
  year:   2026
effective_date: "2026-01-01"
notice_no: "소득세법 제52조(특별소득공제)·제59조의4(특별세액공제) (2026 시행 기준)"
source_url: "https://www.law.go.kr/"
# 2026-04-24 조사 근거:
#   - 의료비(§59의4 제2항): 총급여 3% 초과분의 15% 세액공제.
#                          난임시술비 30%, 미숙아·선천성이상아 20%.
#                          일반 한도 연 700만원, 본인·장애인·65세 이상 한도 없음.
#   - 교육비(§59의4 제3항): 근로자 본인 15% 세액공제(한도 없음).
#                          자녀 초·중·고 연 300만원, 대학생 연 900만원 한도 내 15%.
#                          장애인 특수교육비 한도 없음 15%.
#   - 기부금(§59의4 제4항): 법정기부금 전액 15%(1천만원 초과분 30%).
#                          지정기부금 근로소득금액 30% 한도 15%(1천만원 초과분 30%).
#                          정치자금 10만원 이하 100/110 환급세액공제.
#   - 장기주택저당차입금 이자상환액(§52 제4항): 소득공제.
#                          상환기간 15년 이상 고정금리·비거치식: 연 2,000만원 한도.
#                          고정금리 또는 비거치식: 연 1,800만원 한도.
#                          기타: 연 500만원 한도. 15년 미만(10~15년)도 300만원 한도 가능.
data:
  # 의료비 세액공제
  medical:
    gross_income_floor_rate: "0.03"     # 총급여 3% 초과분만 공제 대상
    credit_rate:             "0.15"     # 일반 의료비 15%
    infertility_rate:        "0.30"     # 난임시술비 30%
    premature_rate:          "0.20"     # 미숙아·선천성이상아 20%
    general_limit:           7000000    # 일반 의료비 연 700만원 한도
    # 본인·장애인·65세 이상·6세 이하는 한도 없음 (특수 대상)
    special_limit:           null

  # 교육비 세액공제
  education:
    credit_rate:             "0.15"
    limits:
      self:                  null          # 근로자 본인: 한도 없음
      preschool:             3000000       # 영유아(취학 전) 연 300만원
      elementary:            3000000       # 초·중·고 연 300만원
      middle_high:           3000000
      university:            9000000       # 대학(원 제외) 연 900만원
      disabled_special:      null          # 장애인 특수교육비: 한도 없음

  # 기부금 세액공제
  donation:
    rate_low:                "0.15"        # 1천만원 이하분
    rate_high:               "0.30"        # 1천만원 초과분
    threshold:               10000000      # 1천만원 분기선
    # 지정기부금 한도: 근로소득금액의 30%
    designated_limit_rate:   "0.30"
    political_credit_rate:   "0.9090909091"   # 정치자금 10만 이하: 100/110 환급

  # 장기주택저당차입금 이자상환액 소득공제
  housing_loan_interest:
    # 상환기간별, 조건별 한도 (원)
    # key = "{term_years}_{condition}"
    limits:
      "15+_fixed_nongrace":  20000000      # 15년 이상, 고정금리 + 비거치식
      "15+_fixed_or_ng":     18000000      # 15년 이상, 고정금리 OR 비거치식
      "15+_other":           5000000       # 15년 이상, 기타
      "10_15_fixed_or_ng":   3000000       # 10~15년, 고정금리 OR 비거치식
