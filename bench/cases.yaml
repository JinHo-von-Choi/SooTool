# SooTool 벤치마크 리트머스 케이스 (FB-M3)
#
# 작성자: 최진호
# 작성일: 2026-04-24
#
# 20 케이스: 한국 소득세(8), 부가세(3), 복리이자(2),
# 확률/통계(3), 공학(2), 양도소득세(2).
#
# 각 케이스는 run_benchmark.py 에 의해 다음 2경로로 평가된다.
#   1. REGISTRY.invoke(tool_call.namespace + '.' + name, **args)
#      → SooTool ground truth (Decimal 정확치)
#   2. LLM 채팅 (OpenAI / Anthropic / Google) → 자연어 prompt 전달 후
#      응답에서 숫자 추출하여 expected_decimal_string 과 비교.
#
# 비교 분류:
#   - exact : 정확 일치
#   - approx: 상대오차 <= 1e-4 (±0.01%)
#   - wrong : 이외
#
# expected_decimal_string 은 REGISTRY.invoke 로 미리 산출한 정답
# (master@587b763, 2026-04-24 기준). 정책 YAML 개정 시 재생성 필요.

cases:
  # =========================================================================
  # 한국 소득세 8구간 경계 (tax.kr_income, year=2026)
  # =========================================================================
  - id: tax_kr_income_14M
    category: tax_korea
    difficulty: easy
    prompt: |
      한국 2026년 과세표준 14,000,000원에 대한 종합소득세를 원 단위로 계산해 주세요.
      결과는 숫자만 답하세요.
    tool_call:
      tool: tax.kr_income
      args:
        taxable_income: "14000000"
        year: 2026
      field: tax
    expected_decimal_string: "840000"

  - id: tax_kr_income_50M
    category: tax_korea
    difficulty: easy
    prompt: |
      한국 2026년 과세표준 50,000,000원에 대한 종합소득세를 원 단위로 계산해 주세요.
      결과는 숫자만 답하세요.
    tool_call:
      tool: tax.kr_income
      args:
        taxable_income: "50000000"
        year: 2026
      field: tax
    expected_decimal_string: "6240000"

  - id: tax_kr_income_88M
    category: tax_korea
    difficulty: medium
    prompt: |
      한국 2026년 과세표준 88,000,000원에 대한 종합소득세를 원 단위로 계산해 주세요.
      결과는 숫자만 답하세요.
    tool_call:
      tool: tax.kr_income
      args:
        taxable_income: "88000000"
        year: 2026
      field: tax
    expected_decimal_string: "15360000"

  - id: tax_kr_income_125M_midbracket
    category: tax_korea
    difficulty: medium
    prompt: |
      한국 2026년 과세표준 125,000,000원(8,800만~1.5억 구간 내부)에 대한
      종합소득세를 원 단위로 계산해 주세요. 결과는 숫자만 답하세요.
    tool_call:
      tool: tax.kr_income
      args:
        taxable_income: "125000000"
        year: 2026
      field: tax
    expected_decimal_string: "28310000"

  - id: tax_kr_income_150M
    category: tax_korea
    difficulty: medium
    prompt: |
      한국 2026년 과세표준 150,000,000원에 대한 종합소득세를 원 단위로 계산해 주세요.
      결과는 숫자만 답하세요.
    tool_call:
      tool: tax.kr_income
      args:
        taxable_income: "150000000"
        year: 2026
      field: tax
    expected_decimal_string: "37060000"

  - id: tax_kr_income_300M
    category: tax_korea
    difficulty: hard
    prompt: |
      한국 2026년 과세표준 300,000,000원에 대한 종합소득세를 원 단위로 계산해 주세요.
      결과는 숫자만 답하세요.
    tool_call:
      tool: tax.kr_income
      args:
        taxable_income: "300000000"
        year: 2026
      field: tax
