name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Ruff
        run: uv run ruff check src/sootool tests

      - name: Mypy
        run: uv run mypy src/sootool

      - name: Pytest
        run: uv run pytest -q --strict-markers

      - name: MCP smoke (stdio)
        run: uv run python scripts/mcp_smoke_test.py

      - name: Build distributions
        run: uv build

      - name: Validate __version__
        run: uv run python -c "from sootool import __version__; print(__version__)"
