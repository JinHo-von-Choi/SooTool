name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen --extra symbolic

      - name: Ruff
        run: uv run ruff check src/sootool tests scripts

      - name: Mypy
        run: uv run mypy src/sootool scripts

      - name: Pytest
        run: uv run pytest -q --strict-markers

      - name: Tool count single source guard (ADR-019)
        run: |
          set -euo pipefail
          SNAPSHOT="$(uv run python scripts/count_tools.py --json)"
          TOTAL="$(echo "$SNAPSHOT" | python -c 'import json,sys;print(json.load(sys.stdin)["total_tools"])')"
          DOMAINS="$(echo "$SNAPSHOT" | python -c 'import json,sys;print(json.load(sys.stdin)["calculation_domains"])')"
          POLICY="$(echo "$SNAPSHOT" | python -c 'import json,sys;print(json.load(sys.stdin)["policy_tools"])')"
          BASE="$(( TOTAL - POLICY ))"
          echo "measured: total=$TOTAL base=$BASE policy=$POLICY domains=$DOMAINS"
          grep -q "${DOMAINS}개 계산 도메인 ${BASE}개 기본 도구 + ${POLICY}개 admin 정책 도구" README.md \
            || { echo "README.md 첫 문단 숫자 불일치"; exit 1; }
          grep -q "(${BASE}개 기본 + ${POLICY}개 admin, ${DOMAINS} 계산 도메인" README.md \
            || { echo "README.md 카탈로그 헤더 숫자 불일치"; exit 1; }
          grep -q "${DOMAINS}개 계산 도메인 ${BASE}개 기본 도구 + ${POLICY}개 admin 정책 도구" pyproject.toml \
            || { echo "pyproject.toml description 숫자 불일치"; exit 1; }
          grep -q "${DOMAINS} domains, ${BASE} base tools, ${POLICY} admin policy-management tools" CHANGELOG.md \
            || { echo "CHANGELOG.md [Unreleased] 도메인·도구 수 불일치"; exit 1; }
          uv run python scripts/count_tools.py \
            --assert-total "$TOTAL" \
            --assert-domains "$DOMAINS" \
            --assert-policy "$POLICY"

      - name: MCP smoke (stdio)
        run: uv run python scripts/mcp_smoke_test.py

      - name: Build distributions
        run: uv build

      - name: Validate __version__
        run: uv run python -c "from sootool import __version__; print(__version__)"
